apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-web-app-deployment
  namespace: simple-web-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-web-app
  template:
    metadata:
      labels:
        app: simple-web-app
    spec:
      containers:
        - name: simple-web-app
          image: kamleshcloud/simple-web-app:latest
          ports:
            - containerPort: 80